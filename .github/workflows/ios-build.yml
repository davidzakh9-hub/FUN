name: Free Standalone IPA Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Full Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Export App Bundle
        run: npx expo export --platform ios

      - name: Package Into IPA File
        run: |
          mkdir -p build/Payload
          cp -R dist build/Payload/FUN.app
          cd build && zip -r standalone-app.ipa Payload

      - name: Upload Completed IPA
        uses: actions/upload-artifact@v4
        with:
          name: production-ipa
          path: build/standalone-app.ipa
